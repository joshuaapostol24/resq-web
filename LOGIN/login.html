<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        ResQ Admin Login
    </title>

    <link
        rel="stylesheet"
        href="loginstyle.css"
    >

    <script src="https://unpkg.com/lucide@latest"></script>

</head>

<body>

    <div class="login-wrapper">

        <div class="login-card">

            <div class="card-header">

                <div class="logo-box">

                    <i
                        data-lucide="shield-alert"
                    ></i>

                </div>

                <h1>
                    ResQ Admin
                </h1>

                <p>
                    Emergency Management Dashboard
                </p>

            </div>

            <div class="card-body">

                <h2>
                    Admin Login
                </h2>

                <p class="subtitle">

                    Please enter your credentials
                    to access the console.

                </p>

                <div
                    id="loginMessage"
                    class="login-feedback hidden"
                ></div>

                <form id="loginForm">

                    <div class="input-group">

                        <label>
                            Username
                        </label>

                        <div class="input-wrapper">

                            <i
                                data-lucide="user"
                            ></i>

                            <input
                                type="text"
                                id="username"
                                required
                            >

                        </div>

                    </div>

                    <div class="input-group">

                        <label>
                            Password
                        </label>

                        <div class="input-wrapper">

                            <i
                                data-lucide="lock"
                            ></i>

                            <input
                                type="password"
                                id="password"
                                required
                            >

                            <i
                                data-lucide="eye"
                                class="eye-icon"
                            ></i>

                        </div>

                    </div>

                    <button
                        type="submit"
                        class="btn-primary"
                    >

                        Sign In to Dashboard

                    </button>

                </form>

            </div>

        </div>

    </div>

    <script src="login.js"></script>

</body>
</html>
